# Njord 2026 - Autonomous Boat Stack
# Target: Raspberry Pi 5 (arm64)
#
# Usage:
#   podman compose build
#   podman compose up -d
#   podman compose logs -f

name: njord2026

services:

  # --- BlueOS – ArduPilot companion -------------------------------------------
  blueos:
    image: docker.io/bluerobotics/blueos-core:1.4
    container_name: blueos
    restart: unless-stopped
    privileged: true
    network_mode: host
    volumes:
      - /run/udev:/run/udev:ro
      - /run/user/1000/podman/podman.sock:/var/run/docker.sock
      - blueos_config:/usr/blueos/userdata
    environment:
      - BLUEOS_UID=1000
    labels:
      - com.centurylinklabs.watchtower.enable=false

  # --- Njord ROS2 stack – single image ----------------------------------------
  njord:
    build:
      context: .
      dockerfile: Containerfile
      target: prod
    image: njord/njord:latest
    container_name: njord
    restart: unless-stopped
    network_mode: host
    ipc: host
    pid: host
    devices:
      - /dev/video0:/dev/video0
    volumes:
      - ./models:/models:ro
    environment:
      - ROS_DOMAIN_ID=0
      - RMW_IMPLEMENTATION=rmw_fastrtps_cpp
    depends_on:
      - blueos

volumes:
  blueos_config:
