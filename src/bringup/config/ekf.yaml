ekf_node:
  ros__parameters:
    frequency: 30.0
    two_d_mode: true
    publish_tf: true
    map_frame: map
    odom_frame: odom
    base_link_frame: base_link
    world_frame: odom

    imu0: /imu_driver/imu_raw
    imu0_config: [false, false, false,
                  false, false, true,
                  false, false, false,
                  false, false, true,
                  true,  false, false]

    # Sim: Gazebo ground-truth odometry (only published in sim)
    odom0: /odom
    odom0_config: [true,  true,  false,
                   false, false, false,
                   true,  true,  false,
                   false, false, false,
                   false, false, false]

    # Hardware: ArduPilot EKF output via MAVROS (already fuses IMU + GPS + compass + baro).
    # No need for a second odom from /odometry/gps — that would double-fuse GPS.
    # Missing topics are silently ignored, so this is safe to leave in for sim too.
    odom1: /mavros/local_position/odom
    odom1_config: [true,  true,  false,
                   false, false, false,
                   true,  true,  false,
                   false, false, true,
                   false, false, false]
