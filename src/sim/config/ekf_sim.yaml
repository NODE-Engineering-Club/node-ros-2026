# ekf.yaml — simulation-compatible version
# Differences vs hardware version:
#   - odom0 source added (/odom from simulator)
#   - imu0 source kept (/imu/data from simulator)
# This file is used ONLY by sim_nav2.launch.py — the original ekf.yaml is untouched.

ekf_node:
  ros__parameters:
    frequency: 30.0
    two_d_mode: true
    publish_tf: true
    map_frame: map
    odom_frame: odom
    base_link_frame: base_link
    world_frame: odom

    # Odometry source from simulator
    odom0: /odom
    odom0_config: [true,  true,  false,
                   false, false, false,
                   true,  false, false,
                   false, false, false,
                   false, false, false]
    odom0_differential: false
    odom0_relative: false

    # IMU source from simulator (yaw + yaw rate)
    imu0: /imu/data
    imu0_config: [false, false, false,
                  false, false, true,
                  false, false, false,
                  false, false, true,
                  true,  false, false]
    imu0_differential: false
    imu0_relative: false
    imu0_remove_gravitational_acceleration: true

    print_diagnostics: true
    debug: false
