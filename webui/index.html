<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8"/>
  <title>Njord Live Dashboard</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#060d06;color:#00ff00;font-family:'Courier New',monospace;height:100vh;display:flex;flex-direction:column;overflow:hidden}

    /* ── header ── */
    #header{display:flex;align-items:center;gap:10px;padding:6px 14px;border-bottom:1px solid #0d2a0d;flex-shrink:0;flex-wrap:wrap}
    #title{font-size:1em;font-weight:bold;letter-spacing:.05em;margin-right:4px}
    .chip{font-size:.65em;padding:2px 7px;border-radius:3px;border:1px solid #1a4a1a;color:#555;background:#0a0f0a;transition:all .3s}
    .chip.on{color:#00ff00;border-color:#00ff00;text-shadow:0 0 6px #00ff00}
    .chip.warn{color:#ffaa00;border-color:#ffaa00}
    #odom-bar{margin-left:auto;font-size:.75em;color:#aaa;display:flex;gap:16px}
    .ofield label{color:#007700;font-size:.7em;display:block}
    .ofield span{color:#00ff00}

    /* ── grid ── */
    #grid{flex:1;display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;gap:3px;padding:3px;min-height:0}
    .panel{border:1px solid #0d2a0d;display:flex;flex-direction:column;overflow:hidden;background:#020802}
    .panel-title{font-size:.6em;color:#005500;padding:3px 8px;flex-shrink:0;letter-spacing:.12em;border-bottom:1px solid #0a1e0a}
    .panel-body{flex:1;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center}

    /* ── camera / seg ── */
    #cam-canvas,#seg-img{max-width:100%;max-height:100%;object-fit:contain;display:block}
    .no-signal{color:#1a4a1a;font-size:.75em;letter-spacing:.1em}

    /* ── lidar ── */
    #lidar-canvas{position:absolute;top:0;left:0;width:100%;height:100%;display:block}

    /* ── gps map ── */
    #map{width:100%;height:100%}
    #gps-overlay{position:absolute;top:8px;left:8px;z-index:500;background:rgba(0,0,0,.82);border:1px solid #00ff00;padding:8px 12px;font-size:.72em;min-width:160px;pointer-events:none}
    #gps-status{font-size:.7em;font-weight:bold;padding:2px 6px;border-radius:2px;margin-bottom:6px;display:inline-block;background:#440000;color:#ff4444;border:1px solid #ff4444}
    #gps-status.on{background:#004400;color:#00ff00;border-color:#00ff00}
    .gfield label{color:#007700;font-size:.7em}
    .gfield span{color:#00ff00}

    /* ── det badge ── */
    #det-count{position:absolute;top:6px;right:8px;font-size:.65em;color:#ffaa00;background:rgba(0,0,0,.75);padding:2px 6px;border:1px solid #ffaa00;border-radius:2px;z-index:10}

    /* ── buoy list ── */
    #buoy-list{position:absolute;bottom:8px;left:8px;z-index:500;background:rgba(0,0,0,.82);border:1px solid #333;padding:6px 10px;font-size:.68em;min-width:150px;pointer-events:none;max-height:40%;overflow:hidden}
    #buoy-list-title{color:#005500;letter-spacing:.1em;margin-bottom:4px;font-size:.75em}
    .brow{display:flex;gap:8px;align-items:center;margin-bottom:2px}
    .bdot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
    .binfo{color:#aaa}
  </style>
</head>
<body>

<div id="header">
  <span id="title">&#9875; NJORD LIVE DASHBOARD</span>
  <span class="chip" id="chip-cam">CAM</span>
  <span class="chip" id="chip-seg">SEG</span>
  <span class="chip" id="chip-lidar">LIDAR</span>
  <span class="chip" id="chip-gps">GPS</span>
  <span class="chip" id="chip-odom">ODOM</span>
  <div id="odom-bar">
    <div class="ofield"><label>HEADING</label><span id="hdg">---</span>°</div>
    <div class="ofield"><label>SPEED</label><span id="spd">---</span> m/s</div>
    <div class="ofield"><label>X</label><span id="ox">---</span> m</div>
    <div class="ofield"><label>Y</label><span id="oy">---</span> m</div>
  </div>
</div>

<div id="grid">

  <!-- Camera + YOLO overlay -->
  <div class="panel">
    <div class="panel-title">&#9654; CAMERA FEED + YOLO DETECTIONS</div>
    <div class="panel-body">
      <canvas id="cam-canvas"></canvas>
      <div id="det-count" style="display:none">0 objects</div>
      <div class="no-signal" id="cam-nosig">NO SIGNAL</div>
    </div>
  </div>

  <!-- Segmentation mask -->
  <div class="panel">
    <div class="panel-title">&#9654; SEGMENTATION MASK</div>
    <div class="panel-body">
      <img id="seg-img" src="" alt="" style="display:none"/>
      <div class="no-signal" id="seg-nosig">NO SIGNAL</div>
    </div>
  </div>

  <!-- LiDAR polar plot -->
  <div class="panel">
    <div class="panel-title">&#9654; LIDAR SCAN (top-down)</div>
    <div class="panel-body" style="background:#020802">
      <canvas id="lidar-canvas"></canvas>
    </div>
  </div>

  <!-- GPS map -->
  <div class="panel">
    <div class="panel-title">&#9654; GPS MAP + BUOY POSITIONS</div>
    <div class="panel-body">
      <div id="map"></div>
      <div id="buoy-list">
        <div id="buoy-list-title">&#9650; BUOYS</div>
        <div id="buoy-rows"></div>
      </div>
      <div id="gps-overlay">
        <div id="gps-status">WAITING FOR FIX...</div>
        <div class="gfield"><label>LATITUDE</label><span id="lat">--</span></div>
        <div class="gfield"><label>LONGITUDE</label><span id="lon">--</span></div>
        <div class="gfield"><label>ALTITUDE (m)</label><span id="alt">--</span></div>
        <div class="gfield"><label>REL ALT (m)</label><span id="rel_alt">--</span></div>
      </div>
    </div>
  </div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// ═══════════════════════════════════════════════════════
// Chip helper
// ═══════════════════════════════════════════════════════
function chip(id, state) {
  const el = document.getElementById('chip-' + id);
  if (!el) return;
  el.className = 'chip' + (state ? ' on' : '');
}

// ═══════════════════════════════════════════════════════
// GPS MAP  (polls /api/gps from MAVLink2REST proxy)
// ═══════════════════════════════════════════════════════
const map = L.map('map', {zoomControl:false}).setView([0,0],2);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
const gpsMarker = L.circleMarker([0,0],{color:'#00ff00',radius:7,fillOpacity:.85}).addTo(map);
const gpsTrack  = L.polyline([],{color:'#00ff00',weight:2,opacity:.5}).addTo(map);
let firstFix = true;

async function updateGPS() {
  try {
    const res  = await fetch('/api/gps');
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    const msg = data.message;
    const lat = msg.lat / 1e7, lon = msg.lon / 1e7;
    const alt = msg.alt / 1000, rel_alt = msg.relative_alt / 1000;
    const pos = [lat, lon];
    gpsMarker.setLatLng(pos);
    gpsTrack.addLatLng(pos);
    if (firstFix) { map.setView(pos, 16); firstFix = false; }
    document.getElementById('gps-status').textContent = 'GPS ACTIVE';
    document.getElementById('gps-status').className   = 'on';
    document.getElementById('lat').textContent     = lat.toFixed(6) + '°';
    document.getElementById('lon').textContent     = lon.toFixed(6) + '°';
    document.getElementById('alt').textContent     = alt.toFixed(1) + ' m';
    document.getElementById('rel_alt').textContent = rel_alt.toFixed(1) + ' m';
    chip('gps', true);
  } catch {
    document.getElementById('gps-status').textContent = 'WAITING FOR FIX...';
    document.getElementById('gps-status').className   = '';
    chip('gps', false);
  }
  setTimeout(updateGPS, 1000);
}

// ═══════════════════════════════════════════════════════
// CAMERA  (polls /api/camera, draws bbox overlay)
// ═══════════════════════════════════════════════════════
const camCanvas  = document.getElementById('cam-canvas');
const camCtx     = camCanvas.getContext('2d');
const camNosig   = document.getElementById('cam-nosig');
const detCountEl = document.getElementById('det-count');
let latestDets   = [];

async function updateCamera() {
  try {
    const res = await fetch('/api/camera');
    if (res.status === 204) throw new Error('no frame');
    if (!res.ok) throw new Error('http ' + res.status);
    const blob = await res.blob();
    const bmp  = await createImageBitmap(blob);
    camCanvas.width  = bmp.width;
    camCanvas.height = bmp.height;
    camCtx.drawImage(bmp, 0, 0);
    // YOLO bounding boxes
    if (latestDets.length) {
      camCtx.lineWidth = 2;
      camCtx.font = '12px Courier New';
      for (const d of latestDets) {
        camCtx.strokeStyle = '#00ff00';
        camCtx.strokeRect(d.cx - d.w/2, d.cy - d.h/2, d.w, d.h);
        if (d.class_id !== undefined) {
          const label = d.class_id + (d.score !== undefined ? ' ' + (d.score*100).toFixed(0)+'%' : '');
          camCtx.fillStyle = 'rgba(0,0,0,.6)';
          camCtx.fillRect(d.cx - d.w/2, d.cy - d.h/2 - 16, camCtx.measureText(label).width + 6, 16);
          camCtx.fillStyle = '#00ff00';
          camCtx.fillText(label, d.cx - d.w/2 + 3, d.cy - d.h/2 - 3);
        }
      }
    }
    camNosig.style.display = 'none';
    camCanvas.style.display = 'block';
    const n = latestDets.length;
    detCountEl.style.display = n ? 'block' : 'none';
    detCountEl.textContent   = n + ' object' + (n===1?'':'s');
    chip('cam', true);
  } catch {
    camCanvas.style.display = 'none';
    camNosig.style.display  = 'block';
    chip('cam', false);
  }
  setTimeout(updateCamera, 100);
}

// ═══════════════════════════════════════════════════════
// SEGMENTATION MASK
// ═══════════════════════════════════════════════════════
const segImg   = document.getElementById('seg-img');
const segNosig = document.getElementById('seg-nosig');
let segUrl = null;

async function updateSeg() {
  try {
    const res = await fetch('/api/seg');
    if (res.status === 204) throw new Error('no frame');
    if (!res.ok) throw new Error('http ' + res.status);
    const blob = await res.blob();
    const url  = URL.createObjectURL(blob);
    if (segUrl) URL.revokeObjectURL(segUrl);
    segUrl = url;
    segImg.src = url;
    segImg.style.display = 'block';
    segNosig.style.display = 'none';
    chip('seg', true);
  } catch {
    segImg.style.display   = 'none';
    segNosig.style.display = 'block';
    chip('seg', false);
  }
  setTimeout(updateSeg, 100);
}

// ═══════════════════════════════════════════════════════
// LIDAR polar plot
// ═══════════════════════════════════════════════════════
const lidarCanvas = document.getElementById('lidar-canvas');
const lidarCtx    = lidarCanvas.getContext('2d');

function drawLidar(data) {
  // offsetWidth/offsetHeight read the CSS-rendered pixel size of the canvas,
  // which is reliable once the page has laid out (absolute-positioned, fills parent).
  const w = lidarCanvas.offsetWidth  || 400;
  const h = lidarCanvas.offsetHeight || 400;
  lidarCanvas.width  = w;
  lidarCanvas.height = h;

  const cx = w / 2, cy = h / 2;
  const maxR  = data.range_max || 10;
  const scale = Math.min(w, h) * 0.45 / maxR;

  // Background
  lidarCtx.fillStyle = '#020802';
  lidarCtx.fillRect(0, 0, w, h);

  // Range rings + labels
  lidarCtx.strokeStyle = '#0a2a0a';
  lidarCtx.lineWidth = 1;
  lidarCtx.font = '10px Courier New';
  lidarCtx.fillStyle = '#1a5a1a';
  for (let i = 1; i <= 4; i++) {
    const r = maxR * i / 4;
    lidarCtx.beginPath();
    lidarCtx.arc(cx, cy, r * scale, 0, Math.PI * 2);
    lidarCtx.stroke();
    lidarCtx.fillText((r % 1 === 0 ? r : r.toFixed(1)) + 'm', cx + 3, cy - r * scale + 11);
  }

  // Axis lines
  lidarCtx.strokeStyle = '#0d3a0d';
  lidarCtx.beginPath();
  lidarCtx.moveTo(cx, 4); lidarCtx.lineTo(cx, h - 4);
  lidarCtx.moveTo(4, cy); lidarCtx.lineTo(w - 4, cy);
  lidarCtx.stroke();

  // Forward arrow (ROS x+ = up on screen)
  lidarCtx.strokeStyle = '#005500';
  lidarCtx.lineWidth = 2;
  lidarCtx.beginPath();
  lidarCtx.moveTo(cx, cy - 18);
  lidarCtx.lineTo(cx - 4, cy - 12);
  lidarCtx.moveTo(cx, cy - 18);
  lidarCtx.lineTo(cx + 4, cy - 12);
  lidarCtx.stroke();

  // Boat centre dot
  lidarCtx.fillStyle = '#00aa00';
  lidarCtx.beginPath();
  lidarCtx.arc(cx, cy, 4, 0, Math.PI * 2);
  lidarCtx.fill();

  // Points: ROS x=fwd→screen up, ROS y=left→screen left
  lidarCtx.fillStyle = '#00ff00';
  for (const pt of data.points) {
    if (!pt) continue;
    const sx = cx - pt[1] * scale;
    const sy = cy - pt[0] * scale;
    if (sx < 0 || sx > w || sy < 0 || sy > h) continue;
    lidarCtx.fillRect(sx - 1, sy - 1, 2, 2);
  }
}

async function updateLidar() {
  try {
    const res = await fetch('/api/lidar');
    if (res.ok) {
      const data = await res.json();
      if (data.points) {
        drawLidar(data);
        chip('lidar', true);
      }
    } else {
      chip('lidar', false);
    }
  } catch {
    chip('lidar', false);
  }
  setTimeout(updateLidar, 120);
}

// ═══════════════════════════════════════════════════════
// ODOMETRY
// ═══════════════════════════════════════════════════════
async function updateOdom() {
  try {
    const res = await fetch('/api/odom');
    if (res.ok) {
      const d = await res.json();
      document.getElementById('hdg').textContent = d.yaw_deg.toFixed(1);
      document.getElementById('spd').textContent = d.speed.toFixed(2);
      document.getElementById('ox').textContent  = d.x.toFixed(1);
      document.getElementById('oy').textContent  = d.y.toFixed(1);
      chip('odom', true);
    }
  } catch {
    chip('odom', false);
  }
  setTimeout(updateOdom, 200);
}

// ═══════════════════════════════════════════════════════
// DETECTIONS  (kept fresh for camera overlay)
// ═══════════════════════════════════════════════════════
async function updateDetections() {
  try {
    const res = await fetch('/api/detections');
    if (res.ok) {
      const d = await res.json();
      latestDets = d.detections || [];
    }
  } catch { /* keep stale */ }
  setTimeout(updateDetections, 100);
}

// ═══════════════════════════════════════════════════════
// BUOYS  — colored markers on GPS map + LiDAR overlay
// ═══════════════════════════════════════════════════════
const BUOY_CSS = {
  red:'#ff4444', green:'#00dd44', yellow:'#ffcc00',
  black:'#888888', white:'#eeeeee', blue:'#4488ff', unknown:'#666666'
};

let latestBuoys = [];
const buoyMapMarkers = [];

async function updateBuoys() {
  try {
    const res = await fetch('/api/buoys');
    if (res.ok) {
      const data = await res.json();
      latestBuoys = Array.isArray(data) ? data : [];
      _refreshBuoyMap();
      _refreshBuoyList();
    }
  } catch { /* keep stale */ }
  setTimeout(updateBuoys, 250);
}

function _refreshBuoyMap() {
  // Remove old markers
  buoyMapMarkers.forEach(m => map.removeLayer(m));
  buoyMapMarkers.length = 0;

  for (const b of latestBuoys) {
    if (b.lat === null || b.lon === null) continue;
    const c = BUOY_CSS[b.color] || BUOY_CSS.unknown;
    const m = L.circleMarker([b.lat, b.lon], {
      color: c, fillColor: c, fillOpacity: 0.85,
      radius: 9, weight: 2
    }).bindTooltip(
      `<b style="color:${c}">${(b.color||'?').toUpperCase()}</b><br>`
      + `${b.range.toFixed(1)} m &nbsp; ${b.bearing_deg.toFixed(0)}°`,
      {permanent: false, direction: 'top'}
    ).addTo(map);
    buoyMapMarkers.push(m);
  }
}

function _refreshBuoyList() {
  const rows = document.getElementById('buoy-rows');
  if (!rows) return;
  rows.innerHTML = '';
  if (!latestBuoys.length) {
    rows.innerHTML = '<div style="color:#333">none detected</div>';
    return;
  }
  for (const b of latestBuoys) {
    const c  = BUOY_CSS[b.color] || BUOY_CSS.unknown;
    const el = document.createElement('div');
    el.className = 'brow';
    el.innerHTML = `<div class="bdot" style="background:${c};border:1px solid ${c}88"></div>`
      + `<div class="binfo">${(b.color||'?').padEnd(7)} &nbsp;`
      + `${b.range.toFixed(1)}m &nbsp; ${b.bearing_deg.toFixed(0)}°</div>`;
    rows.appendChild(el);
  }
}

// Extend drawLidar to overlay buoy positions
const _drawLidarBase = drawLidar;
function drawLidar(data) {
  _drawLidarBase(data);
  if (!latestBuoys.length) return;
  const w  = lidarCanvas.offsetWidth  || 400;
  const h  = lidarCanvas.offsetHeight || 400;
  const cx = w / 2, cy = h / 2;
  const maxR  = data.range_max || 10;
  const scale = Math.min(w, h) * 0.45 / maxR;

  lidarCtx.font = '9px Courier New';
  for (const b of latestBuoys) {
    const rad = b.bearing_deg * Math.PI / 180;
    // base_link: bx=fwd, by=left  →  screen: up=fwd, left=left
    const bx = b.range * Math.cos(rad);
    const by = b.range * Math.sin(rad);
    const sx = cx - by * scale;
    const sy = cy - bx * scale;
    if (sx < 0 || sx > w || sy < 0 || sy > h) continue;
    const c = BUOY_CSS[b.color] || BUOY_CSS.unknown;
    lidarCtx.fillStyle   = c;
    lidarCtx.strokeStyle = 'rgba(0,0,0,0.7)';
    lidarCtx.lineWidth   = 1;
    lidarCtx.beginPath();
    lidarCtx.arc(sx, sy, 6, 0, Math.PI * 2);
    lidarCtx.fill();
    lidarCtx.stroke();
    // label: first letter of color + range
    lidarCtx.fillStyle = '#000';
    lidarCtx.fillText(
      (b.color||'?')[0].toUpperCase() + ' ' + b.range.toFixed(1) + 'm',
      sx + 8, sy + 4
    );
  }
}

// ═══════════════════════════════════════════════════════
// Boot
// ═══════════════════════════════════════════════════════
updateGPS();
updateCamera();
updateSeg();
updateLidar();
updateOdom();
updateDetections();
updateBuoys();
</script>
</body>
</html>
